name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  extract-version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [extract-version]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: docker/setup-qemu-action@68827325e0b33c7199eb31dd4e31fbe9023e06e3 # v3.0.0
      - uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: packages/api
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            COCKPIT_VERSION=${{ needs.extract-version.outputs.version }}
            COCKPIT_EDITION=ce
          tags: |
            ghcr.io/lagoon-tech-systems/cockpit:latest
            ghcr.io/lagoon-tech-systems/cockpit:${{ needs.extract-version.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.extract-version.outputs.version }}

  publish-npm-cli:
    name: Publish CLI to npm
    runs-on: ubuntu-latest
    needs: [extract-version]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: |
          cd packages/cli
          npm version ${{ needs.extract-version.outputs.version }} --no-git-tag-version --allow-same-version
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # trigger-eas-build:
  #   Uncomment when EXPO_TOKEN secret is configured
  #   name: Trigger EAS Build
  #   runs-on: ubuntu-latest
  #   needs: [extract-version]
  #   steps:
  #     - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
  #     - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
  #       with:
  #         node-version: 20
  #     - uses: expo/expo-github-action@v8
  #       with:
  #         eas-version: latest
  #         token: ${{ secrets.EXPO_TOKEN }}
  #     - run: |
  #         cd packages/app
  #         eas build --platform ios --profile production --non-interactive --no-wait
  #         eas build --platform android --profile production --non-interactive --no-wait

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [extract-version, build-docker]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          echo "changes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Package Windows Agent
        run: |
          cd packages/windows-agent
          zip -r ../../windows-agent-${{ needs.extract-version.outputs.tag }}.zip \
            . -x "__pycache__/*" ".env" "venv/*" "*.pyc"
          cd ../..
          sha256sum windows-agent-*.zip > CHECKSUMS.sha256

      - uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          tag_name: ${{ needs.extract-version.outputs.tag }}
          name: Lagoon Cockpit ${{ needs.extract-version.outputs.tag }}
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.changes }}

            ## Distribution
            - **Docker**: `docker pull ghcr.io/lagoon-tech-systems/cockpit:${{ needs.extract-version.outputs.version }}`
            - **npm CLI**: `npx lagoon-cockpit-cli@${{ needs.extract-version.outputs.version }}`
          files: |
            windows-agent-*.zip
            CHECKSUMS.sha256
