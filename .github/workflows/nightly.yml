name: Nightly

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-ci:
    name: Full CI Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: cd node_modules/better-sqlite3 && npx --yes prebuild-install || npm run build-release
      - run: npx eslint packages/api/src
      - run: cd packages/api && npm test
      - run: npm audit --audit-level=high --workspaces

  docker-build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
      - run: docker build --no-cache -t cockpit-nightly packages/api

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: [docker-build-test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
      - run: docker build -t cockpit-scan packages/api
      - uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: cockpit-scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  dependency-freshness:
    name: Dependency Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm outdated --workspaces || true
