name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint-js:
    name: Lint JavaScript/TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npx eslint packages/api/src
      - run: npx prettier --check "packages/api/src/**/*.js"

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: cd packages/app && npx tsc --noEmit

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@586f66d7886cd0b037c7c245d4a6e34ef357ab10 # v3.94.1
        with:
          extra_args: --only-verified

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm audit --audit-level=high --workspaces

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    needs: [lint-js]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: cd node_modules/better-sqlite3 && npx --yes prebuild-install || npm run build-release
      - run: cd packages/api && npm test

  build-docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-api]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: docker build --no-cache -t cockpit-api-test packages/api
      - name: Verify image runs
        run: |
          docker run -d --name cockpit-test \
            -e JWT_SECRET=ci-test-secret-$(date +%s) \
            -e API_KEY=ci-test-key \
            -e AUTH_MODE=key \
            cockpit-api-test
          sleep 3
          HEALTH=$(docker exec cockpit-test wget -qO- http://localhost:3000/ 2>&1 || true)
          echo "$HEALTH"
          echo "$HEALTH" | grep -q '"status":"ok"'
          docker stop cockpit-test
